<svg xmlns="http://www.w3.org/2000/svg" width="340" height="380" viewBox="0 0 340 380">
  <defs>
    <!-- Green vertical gradient: bottom of bar (midY) to top -->
    <linearGradient id="hv-greenGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#97c459"/>
      <stop offset="100%" stop-color="#3b6d11"/>
    </linearGradient>
    <!-- Red vertical gradient: top of bar (midY) to bottom -->
    <linearGradient id="hv-redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e57373"/>
      <stop offset="100%" stop-color="#a32d2d"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="hv-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.13)"/>
    </filter>
  </defs>

  <!-- Tooltip card -->
  <rect x="10" y="10" width="320" height="360" rx="10" fill="#ffffff" stroke="#e8e6de" stroke-width="1" filter="url(#hv-shadow)"/>

  <!-- ===================== TEXT SECTION ===================== -->
  <!-- Line 1 -->
  <text x="26" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#5f5e5a">Innlogget: 2 dager siden</text>
  <!-- Line 2 -->
  <text x="26" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#5f5e5a">Innlevert: 3 dager siden</text>
  <!-- Line 3 -->
  <text x="26" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#2c2c2a">11 av 15 leksjoner fullført · Terskel: 50%</text>
  <!-- Line 4 -->
  <text x="26" y="104" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#5f5e5a">0 innleveringer venter vurdering</text>
  <!-- Line 5 -->
  <text x="26" y="126" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#3b6d11">I forkant — levert i 2 leksjoner</text>
  <text x="26" y="144" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#3b6d11">med fremtidig frist</text>
  <!-- Line 6 -->
  <text x="26" y="164" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#4a7c1f">Snitt visning: 74 %</text>

  <!-- Divider -->
  <line x1="20" y1="174" x2="320" y2="174" stroke="#e8e6de" stroke-width="0.75"/>

  <!-- ===================== BATTERY DIAGRAM ===================== -->
  <!--
    Parameters from spec:
    labelH = 16      (height of label area above diagram)
    upH    = 55      (height of positive/green bars above midline)
    downH  = 55      (height of negative/red bars below midline)
    totalH = 126     (total diagram area height = labelH + upH + downH)
    midY   = labelH + upH = 16 + 55 = 71  (relative to diagram top)
    barW   = 7
    gap    = 11      (center-to-center spacing = barW + gap = 18)

    Diagram top in SVG: y=180
    Absolute midY in SVG: 180 + 71 = 251
    Absolute labelY in SVG: 180 + 16 - 2 = 194  (bottom of label area)
    100% dashed line: y = 180 + labelH + 1 = 197
    Left margin x = 20

    13 bars (L16-L28), center x of bar i = 20 + (barW/2) + i*(barW+gap)
    barW=7, stride=18
    Centers: 23.5, 41.5, 59.5, 77.5, 95.5, 113.5, 131.5, 149.5, 167.5, 185.5, 203.5, 221.5, 239.5
    Left edge of bar i: center - 3.5

    Bar data (fillH = pixels of green fill from midY upward):
    L16: fillH=55 (100%)
    L17: fillH=48
    L18: fillH=43
    L19: fillH=44
    L20: fillH=41
    L21: fillH=50
    L22: fillH=48
    L23: fillH=55
    L24: fillH=35
    L25: RED full downH=55, + 2 white dots
    L26: fillH=18
    L27: dashed outline down
    L28: dashed outline down
  -->

  <!-- Battery diagram label -->
  <text x="26" y="193" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888780">Lærestoff sett per leksjon</text>

  <!-- 100% dashed reference line at y=197 -->
  <line x1="20" y1="197" x2="300" y2="197" stroke="#d3d1c7" stroke-width="0.75" stroke-dasharray="2,3"/>

  <!-- Midline at y=251 (180+71) -->
  <line x1="20" y1="251" x2="300" y2="251" stroke="#888780" stroke-width="1"/>

  <!-- ---- GREEN BARS ---- -->
  <!-- L16 (i=0): x=20, fillH=55, top=251-55=196 -->
  <rect x="20" y="196" width="7" height="55" rx="1.5" fill="url(#hv-greenGrad)"/>
  <!-- L17 (i=1): x=38, fillH=48, top=203 -->
  <rect x="38" y="203" width="7" height="48" rx="1.5" fill="url(#hv-greenGrad)"/>
  <!-- L18 (i=2): x=56, fillH=43, top=208 -->
  <rect x="56" y="208" width="7" height="43" rx="1.5" fill="url(#hv-greenGrad)"/>
  <!-- L19 (i=3): x=74, fillH=44, top=207 -->
  <rect x="74" y="207" width="7" height="44" rx="1.5" fill="url(#hv-greenGrad)"/>
  <!-- L20 (i=4): x=92, fillH=41, top=210 -->
  <rect x="92" y="210" width="7" height="41" rx="1.5" fill="url(#hv-greenGrad)"/>
  <!-- L21 (i=5): x=110, fillH=50, top=201 -->
  <rect x="110" y="201" width="7" height="50" rx="1.5" fill="url(#hv-greenGrad)"/>
  <!-- L22 (i=6): x=128, fillH=48, top=203 -->
  <rect x="128" y="203" width="7" height="48" rx="1.5" fill="url(#hv-greenGrad)"/>
  <!-- L23 (i=7): x=146, fillH=55, top=196 -->
  <rect x="146" y="196" width="7" height="55" rx="1.5" fill="url(#hv-greenGrad)"/>
  <!-- L24 (i=8): x=164, fillH=35, top=216 -->
  <rect x="164" y="216" width="7" height="35" rx="1.5" fill="url(#hv-greenGrad)"/>

  <!-- L25 (i=9): x=182, RED full downH=55 + 2 white dots in negative zone -->
  <rect x="182" y="251" width="7" height="55" rx="1.5" fill="url(#hv-redGrad)"/>
  <!-- White circles with black border in negative zone (r=3) at y=262 and y=278 -->
  <circle cx="185.5" cy="262" r="3" fill="#ffffff" stroke="#2c2c2a" stroke-width="1"/>
  <circle cx="185.5" cy="276" r="3" fill="#ffffff" stroke="#2c2c2a" stroke-width="1"/>

  <!-- L26 (i=10): x=200, fillH=18 (partially viewed) -->
  <rect x="200" y="233" width="7" height="18" rx="1.5" fill="url(#hv-greenGrad)"/>

  <!-- L27 (i=11): x=218, dashed outline down (future, not started) -->
  <rect x="218" y="251" width="7" height="55" rx="1.5" fill="none" stroke="#b4b2a9" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- L28 (i=12): x=236, dashed outline down -->
  <rect x="236" y="251" width="7" height="55" rx="1.5" fill="none" stroke="#b4b2a9" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ---- LESSON LABELS (rotated -45°) ---- -->
  <!-- L16 label at x=23.5 y above 100%-line = ~192 -->
  <text transform="rotate(-45, 23.5, 188)" x="23.5" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#888780" text-anchor="middle">L16</text>
  <text transform="rotate(-45, 41.5, 188)" x="41.5" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#888780" text-anchor="middle">L17</text>
  <text transform="rotate(-45, 59.5, 188)" x="59.5" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#888780" text-anchor="middle">L18</text>
  <text transform="rotate(-45, 77.5, 188)" x="77.5" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#888780" text-anchor="middle">L19</text>
  <text transform="rotate(-45, 95.5, 188)" x="95.5" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#888780" text-anchor="middle">L20</text>
  <text transform="rotate(-45, 113.5, 188)" x="113.5" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#888780" text-anchor="middle">L21</text>
  <text transform="rotate(-45, 131.5, 188)" x="131.5" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#888780" text-anchor="middle">L22</text>
  <text transform="rotate(-45, 149.5, 188)" x="149.5" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#888780" text-anchor="middle">L23</text>
  <text transform="rotate(-45, 167.5, 188)" x="167.5" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#888780" text-anchor="middle">L24</text>
  <text transform="rotate(-45, 185.5, 188)" x="185.5" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#888780" text-anchor="middle">L25</text>
  <text transform="rotate(-45, 203.5, 188)" x="203.5" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#888780" text-anchor="middle">L26</text>
  <text transform="rotate(-45, 221.5, 188)" x="221.5" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#888780" text-anchor="middle">L27</text>
  <text transform="rotate(-45, 239.5, 188)" x="239.5" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#888780" text-anchor="middle">L28</text>

</svg>
